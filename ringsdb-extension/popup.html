<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>RingsDB 简中工具</title>
    <style>
        /* 基本样式 */
        body {
            width: 380px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            text-align: center;
            padding: 0;
            background-color: #f4f4f4;
            margin: 0;
        }

        h3 {
            margin: 0;
            padding: 15px;
            color: #333;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
        }

        .container {
            padding: 15px;
        }

        /* 模式控制区块 */
        .mode-controls {
            margin-bottom: 15px;
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .mode-controls h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .mode-controls button {
            width: 90px;
            padding: 8px;
            margin: 4px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            background-color: #f0f0f0;
            transition: background-color 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .mode-controls button.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
            font-weight: bold;
        }

        /* 查询工具 */
        .query-tool,
        .batch-tool {
            text-align: left;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            margin-bottom: 15px;
        }

        .query-tool h4,
        .batch-tool h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .query-tool {
            position: relative;
        }

        #autocompleteList {
            list-style-type: none;
            padding: 0;
            margin: 0;
            background-color: white;
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
            position: absolute;
            width: calc(100% - 30px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            left: 15px;
            top: 105px;
            display: none;
            border-radius: 4px;
        }

        #autocompleteList li {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        #autocompleteList li:hover {
            background-color: #f0f0f0;
        }

        #queryButton {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #5bc0de;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #queryButton:hover {
            background-color: #31b0d5;
        }

        #resultDiv {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #eee;
            background-color: #f9f9f9;
            min-height: 20px;
            font-size: 14px;
            word-break: break-all;
            border-radius: 3px;
        }

        #decklistInput {
            resize: vertical;
            min-height: 100px;
        }

        #batchTranslateButton {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #batchTranslateButton:hover {
            background-color: #0056b3;
        }

        #batchResultDiv {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #eee;
            background-color: #f9f9f9;
            min-height: 20px;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            border-radius: 3px;
        }

        /* ============================================================
           折叠区块统一样式
           ============================================================ */
        .favorites-section {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            overflow: hidden;
        }

        .favorites-section>summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #007bff;
            color: white;
            transition: background-color 0.3s;
            user-select: none;
            border-radius: 8px 8px 0 0;
        }

        .favorites-section>summary:hover {
            background: #0056b3;
        }

        .favorites-section>summary h4 {
            margin: 0;
            color: white;
            border: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .favorites-section>summary::-webkit-details-marker {
            display: none;
        }

        .favorites-section>summary::after {
            content: '▼';
            font-size: 14px;
            transition: transform 0.3s ease;
            margin-left: 10px;
        }

        .favorites-section[open]>summary::after {
            transform: rotate(180deg);
        }

        .favorites-content {
            padding: 15px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           扩展列表内部样式
           ============================================================ */
        .pack-item {
            border: 1px solid #e9ecef;
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .pack-item:last-child {
            margin-bottom: 0;
        }

        .pack-item:hover {
            border-color: #b3d4fc;
        }

        .pack-header {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            background: #fafafa;
        }

        .pack-header:hover {
            background: #f0f4f8;
        }

        .pack-header .pack-checkbox {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .pack-header .pack-name {
            font-weight: 500;
            color: #2c3e50;
            flex: 1;
            font-size: 13px;
        }

        .pack-header .pack-name.enabled {
            color: #007bff;
            font-weight: 600;
        }

        .pack-header .pack-code {
            color: #6c757d;
            font-size: 11px;
            margin-left: 6px;
        }

        .pack-header .pack-count {
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .pack-header .expand-icon {
            color: #6c757d;
            font-size: 12px;
            margin-left: 8px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            width: 16px;
            text-align: center;
        }

        .pack-header .expand-icon.expanded {
            transform: rotate(90deg);
        }

        /* 卡牌列表 - 折叠内容 */
        .pack-cards {
            display: none;
            padding: 8px 12px 12px 38px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            max-height: 300px;
            overflow-y: auto;
        }

        .pack-cards.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        .pack-cards .card-item {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            font-size: 12px;
            color: #333;
            border-bottom: 1px solid #f1f3f4;
        }

        .pack-cards .card-item:last-child {
            border-bottom: none;
        }

        .pack-cards .card-item .card-code {
            color: #6c757d;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            width: 50px;
            flex-shrink: 0;
        }

        .pack-cards .card-item .card-name {
            flex: 1;
            margin-left: 8px;
        }

        .pack-cards .empty-state {
            font-size: 12px;
            padding: 10px;
            color: #6c757d;
        }

        .refresh-btn {
            width: 100%;
            padding: 8px;
            margin-top: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s;
        }

        .refresh-btn:hover {
            background-color: #218838;
        }

        .footer {
            text-align: center;
            padding: 10px 20px;
            font-size: 11px;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
            background: #f8f9fa;
        }

        /* 滚动条美化 */
        .pack-cards::-webkit-scrollbar {
            width: 4px;
        }

        .pack-cards::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .pack-cards::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>
    <h3>RingsDB 简中工具</h3>

    <div class="container">

        <!-- ============================================================
             区块1: 翻译功能（折叠）
             ============================================================ -->
        <details class="favorites-section">
            <summary>
                <h4><span>🌐</span><span>翻译功能</span></h4>
            </summary>
            <div class="favorites-content">
                <div class="mode-controls">
                    <h4>网站翻译模式控制</h4>
                    <button id="zhOnlyButton">纯中文翻译</button>
                    <button id="bilingualButton">中英对照</button>
                    <button id="restoreButton">恢复英文</button>
                </div>

                <div class="query-tool">
                    <h4>卡牌名称翻译查询 (单卡)</h4>
                    <input type="text" id="chineseNameInput" placeholder="请输入中英卡牌名称">
                    <ul id="autocompleteList"></ul>
                    <button id="queryButton">查询名称</button>
                    <div id="resultDiv">查询结果会显示在这里...</div>
                </div>

                <div class="batch-tool">
                    <h4>牌表批量翻译</h4>
                    <textarea id="decklistInput" rows="6" placeholder="请贴上牌表"></textarea>
                    <button id="batchTranslateButton">翻译牌表</button>
                    <div id="batchResultDiv">翻译结果会显示在这里...</div>
                </div>
            </div>
        </details>

        <!-- ============================================================
             区块2: 扩展列表（折叠）
             ============================================================ -->
        <details class="favorites-section" id="packsSection">
            <summary>
                <h4><span>📦</span><span>自订扩展包</span></h4>
            </summary>
            <div class="favorites-content">
                <div id="packList" class="pack-list">
                    <div class="empty-state">加载中...</div>
                </div>
                <button id="refreshPacksBtn" class="refresh-btn">🔄 重新加载并应用</button>
            </div>
        </details>

    </div>

    <div class="footer">
        版本 3.6 | 为 RingsDB 定制
    </div>

    <script src="popup.js"></script>
</body>

</html>
